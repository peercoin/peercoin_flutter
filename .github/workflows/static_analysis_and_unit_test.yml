name: Static analysis and unit tests
on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, reopened, synchronize]

jobs:
  code-analysis-and-unit-test:
    runs-on: macos-latest
    timeout-minutes: 45
    steps:
    - uses: actions/checkout@v3
    - uses: actions/setup-java@v2
      with:
        distribution: 'zulu'
        java-version: '11'
    - uses: subosito/flutter-action@v2
      with:
        channel: 'stable'
    - run: flutter pub get
    - run: flutter analyze
    - run: brew install autoconf automake libtool
    # coinlib:build_macos doesn't await Directory.create() before copying the
    # dylib; pre-create build/ so the copy target exists. Drop when coinlib fixes it.
    - run: mkdir -p build
    - run: dart run coinlib:build_macos
    - run: flutter test -r expanded